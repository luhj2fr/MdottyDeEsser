name: Build MdottyDeEsser VST3

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure (CMake, Visual Studio 17 2022)
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_BUILD_TYPE=Release

      - name: Build (Release)
        run: cmake --build build --config Release --target MdottyDeEsser_VST3 --parallel

      - name: Locate built VST3
        id: locate
        shell: pwsh
        run: |
          $vst3 = Get-ChildItem -Path build -Recurse -Filter "MdottyDeEsser.vst3" -Directory | Select-Object -First 1
          if (-not $vst3) {
            Write-Error "Could not find MdottyDeEsser.vst3 in build output"
            exit 1
          }
          Write-Host "Found VST3 at $($vst3.FullName)"
          echo "vst3_path=$($vst3.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: MdottyDeEsser-VST3-Windows
          path: ${{ steps.locate.outputs.vst3_path }}
          if-no-files-found: error
