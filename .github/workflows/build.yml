name: Build VST3 Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup HISE Environment
        run: |
          git clone --depth 1 --branch develop https://github.com/christophhart/HISE.git C:\HISE

      - name: Prepare Project Folders
        run: |
          mkdir XmlPresetBackups
          copy MdottyDeEsser.xml XmlPresetBackups\

      - name: Compile VST3 via HISE CLI
        run: |
          C:\HISE\tools\HISE.exe export_ci "${{ github.workspace }}/XmlPresetBackups/MdottyDeEsser.xml" -t:effect -p:VST3 -a:x64

      - name: Upload VST3 Plugin
        uses: actions/upload-artifact@v4
        with:
          name: MdottyDeEsser-VST3
          path: Binaries/Build/VST3/*.vst3
