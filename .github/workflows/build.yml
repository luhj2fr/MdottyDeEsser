# .github/workflows/build.yml
name: Build VST3 Plugin

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: 'true'
    
    - name: Setup JUCE
      run: |
        git clone --depth 1 https://github.com/juce-framework/JUCE.git JUCE
    
    - name: Install CMake
      uses: kitware/cmake-action@v2
      with:
        cmake-version: '3.25'
    
    - name: Install Visual Studio Build Tools
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Create Build Directory
      run: mkdir build
    
    - name: Configure CMake
      working-directory: build
      run: |
        cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
    
    - name: Build Plugin
      working-directory: build
      run: |
        cmake --build . --config Release --parallel 4
    
    - name: Package VST3
      run: |
        mkdir -p artifacts
        Copy-Item -Recurse "build/MdottyDeEsser_artefacts/Release/VST3" -Destination "artifacts/MdottyDeEsser"
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: MdottyDeEsser-VST3-Windows
        path: artifacts/
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
