name: Build VST3 Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up HISE CLI Compiler
        uses: christophhart/hise-action@v1
        with:
          project-path: '.'
          export-type: 'effect'
          format: 'vst3'

      - name: Upload VST3 Plugin
        uses: actions/upload-artifact@v4
        with:
          name: MdottyDeEsser-VST3
          path: Binaries/Build/VST3/*.vst3
